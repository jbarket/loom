name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: publish to npm + cut GitHub release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Verify tag matches package.json version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          pkg_version=$(node -p "require('./package.json').version")
          tag_version="${TAG_NAME#v}"
          if [ "$pkg_version" != "$tag_version" ]; then
            echo "Tag ($tag_version) does not match package.json version ($pkg_version)" >&2
            exit 1
          fi


      - name: Pre-publish smoke test
        run: |
          npm pack
          TARBALL=$(ls loomai-*.tgz)
          TMPDIR=$(mktemp -d)
          npm install --prefix "$TMPDIR" "$TARBALL"
          LOOM_BIN="$TMPDIR/node_modules/.bin/loom"
          LOOM_ROOT="$TMPDIR/node_modules/loomai"
          "$LOOM_BIN" --help
          "$LOOM_BIN" doctor --json | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf-8')); if(typeof d.nodeOk!=='boolean') process.exit(1);"
          test -f "$LOOM_ROOT/assets/skill/SKILL.md"
          tar -tzf "$TARBALL" | grep -q "package/assets/skill/SKILL.md"
          rm "$TARBALL"
          echo "Pre-publish smoke test passed"

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Detect prerelease
        id: prerelease
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          case "$TAG_NAME" in
            *-alpha*|*-beta*|*-rc*) echo "flag=true"  >> "$GITHUB_OUTPUT" ;;
            *)                       echo "flag=false" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ steps.prerelease.outputs.flag }}
