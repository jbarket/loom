name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: publish to npm + cut GitHub release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Verify tag matches package.json version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          pkg_version=$(node -p "require('./package.json').version")
          tag_version="${TAG_NAME#v}"
          if [ "$pkg_version" != "$tag_version" ]; then
            echo "Tag ($tag_version) does not match package.json version ($pkg_version)" >&2
            exit 1
          fi

      - name: Pack
        run: npm pack

      - name: Smoke-test tarball
        shell: bash
        run: |
          set -euo pipefail
          tarball="$PWD/$(ls *.tgz)"

          tar tf "$tarball" | grep -q "package/assets/skill/SKILL.md" \
            || { echo "ERROR: assets/skill/SKILL.md missing from tarball" >&2; exit 1; }
          echo "PASS: assets/skill/SKILL.md present"

          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT
          npm install --prefix "$tmpdir" "$tarball"
          BIN="$tmpdir/node_modules/.bin/loom"

          "$BIN" --help

          "$BIN" doctor --json \
            | node -e "let b='';process.stdin.on('data',d=>b+=d);process.stdin.on('end',()=>{const d=JSON.parse(b);console.log('doctor --json OK, nodeOk='+d.nodeOk)})"

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Detect prerelease
        id: prerelease
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          case "$TAG_NAME" in
            *-alpha*|*-beta*|*-rc*) echo "flag=true"  >> "$GITHUB_OUTPUT" ;;
            *)                       echo "flag=false" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ steps.prerelease.outputs.flag }}
