name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: build + test (${{ matrix.os }}, Node ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [20.x, 22.x]
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  smoke-test:
    name: smoke test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Pack tarball
        run: npm pack

      - name: Install from tarball into temp dir
        run: |
          TARBALL=$(ls loomai-*.tgz)
          TMPDIR=$(mktemp -d)
          npm install --prefix "$TMPDIR" "$TARBALL"
          echo "LOOM_BIN=$TMPDIR/node_modules/.bin/loom" >> "$GITHUB_ENV"
          echo "LOOM_ROOT=$TMPDIR/node_modules/loomai" >> "$GITHUB_ENV"

      - name: loom --help exits 0
        run: "$LOOM_BIN" --help

      - name: loom doctor --json returns valid JSON
        run: |
          "$LOOM_BIN" doctor --json | node -e "
            const d = JSON.parse(require('fs').readFileSync('/dev/stdin','utf-8'));
            if (typeof d.nodeOk !== 'boolean') { console.error('missing nodeOk'); process.exit(1); }
            if (typeof d.nodeVersion !== 'string') { console.error('missing nodeVersion'); process.exit(1); }
            if (!Array.isArray(d.existingAgents)) { console.error('missing existingAgents'); process.exit(1); }
            console.log('doctor shape OK');
          "

      - name: SKILL.md is present in published package
        run: |
          SKILL="$LOOM_ROOT/assets/skill/SKILL.md"
          if [ ! -f "$SKILL" ]; then
            echo "Error: SKILL.md not found at $SKILL" >&2
            exit 1
          fi
          echo "SKILL.md present at $SKILL"

      - name: Tarball contents include assets
        run: |
          TARBALL=$(ls loomai-*.tgz)
          tar -tzf "$TARBALL" | grep -q "package/assets/skill/SKILL.md"
          echo "SKILL.md present in tarball"

  integration:
    name: integration test (harness transport)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure git identity for snapshot tests
        run: |
          git config --global user.name "CI"
          git config --global user.email "ci@localhost"

      - name: Run integration harness
        run: npx tsx scripts/integration-harness.ts
